server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kamis
    username: kamis-mysql
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

kamis:
